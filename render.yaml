databases:
  - name: house-worker-db
    databaseName: house_worker_db
    plan: free

services:
  - type: web
    name: house-worker-platform
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn house_worker_platform.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: house-worker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.7"
